name: InterviewAI CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Backend Dependencies
        run: npm ci --prefix backend

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Production Readiness Check
        run: npm run check:prod

      - name: Build Production Container
        run: docker build -t interviewai-ci:latest .

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run Performance Smoke Gate
        env:
          NODE_ENV: production
          PORT: 5000
          JWT_SECRET: ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-ci-secret-1234
          REDIS_KEY_PREFIX: ip
        run: |
          node backend/dist/index.js &
          APP_PID=$!
          trap "kill $APP_PID" EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:5000/health >/dev/null; then
              break
            fi
            sleep 1
          done
          k6 run perf/k6/api-load.js --env BASE_URL=http://127.0.0.1:5000 --env K6_VUS=2 --env K6_DURATION=20s

  security:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Dependency Vulnerability Scan
        continue-on-error: true
        run: |
          npm audit --audit-level=high
          npm audit --prefix backend --audit-level=high
          npm audit --prefix frontend --audit-level=high

      - name: Build Image For Scan
        run: docker build -t interviewai-security:latest .

      - name: Container Vulnerability Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: interviewai-security:latest
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true

