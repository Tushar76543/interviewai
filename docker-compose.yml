version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: interviewai-app:latest
    container_name: interviewai-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/interviewai
      REDIS_REST_URL: ""
      REDIS_REST_TOKEN: ""
      REDIS_KEY_PREFIX: ip
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mongo:
    image: mongo:7.0.17
    container_name: interviewai-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2.4-alpine
    container_name: interviewai-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "no",
        "--maxmemory-policy",
        "allkeys-lfu"
      ]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:

